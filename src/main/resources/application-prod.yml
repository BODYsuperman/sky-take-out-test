# Production Configuration
server:
  port: 8080
  servlet:
    context-path: /

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/sky_takeout?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: ${MYSQL_USER:skyuser}
    password: ${MYSQL_PASSWORD:skypassword}
  
  redis:
    host: ${REDIS_HOST:localhost}
    port: 6379
    database: 0
    timeout: 5000
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT Configuration
sky:
  jwt:
    secret-key: ${JWT_SECRET:your-secret-key-here-change-in-production}
    ttl: 7200000 # 2 hours in milliseconds

# Logging
logging:
  level:
    com.sky: INFO
    org.springframework: WARN
    com.baomidou.mybatisplus: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always